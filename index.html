</head>
<body>
  <div id="app">
    <!-- Navigation -->
    <nav class="navbar">
      <div class="nav-container">
        <a href="#/" class="logo">
          <span class="logo-icon">⚔️</span>
          <span class="logo-text">Top5Battle</span>
        </a>
        <div class="nav-links">
          <a href="#/" class="nav-link">Home</a>
          <a href="#/battles" class="nav-link">Battles</a>
          <a href="#/top5" class="nav-link">Top 5</a>
          <a href="#/leaderboard" class="nav-link">Leaderboard</a>
        </div>
        <div class="nav-auth">
          <div id="auth-loading" class="auth-loading hidden">
            <div class="spinner"></div>
          </div>
          <div id="auth-logged-out" class="hidden">
            <button id="login-btn" class="btn btn-primary">Login</button>
          </div>
          <div id="auth-logged-in" class="nav-user hidden">
            <img id="user-avatar" src="" alt="Avatar" class="user-avatar">
            <div class="user-dropdown">
              <a href="#/profile" class="dropdown-item">Profile</a>
              <button id="logout-btn" class="dropdown-item">Logout</button>
            </div>
          </div>
        </div>
        <button class="mobile-menu-btn" id="mobile-menu-btn">
          <span></span><span></span><span></span>
        </button>
      </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu hidden" id="mobile-menu">
      <a href="#/" class="mobile-link">Home</a>
      <a href="#/battles" class="mobile-link">Battles</a>
      <a href="#/top5" class="mobile-link">Top 5</a>
      <a href="#/leaderboard" class="mobile-link">Leaderboard</a>
      <div id="mobile-auth"></div>
    </div>

    <!-- Main Content -->
    <main id="main-content"></main>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-container">
        <div class="footer-brand">
          <span class="logo-icon">⚔️</span>
          <span class="logo-text">Top5Battle</span>
        </div>
        <div class="footer-links">
          <a href="#/">Home</a>
          <a href="#/battles">Battles</a>
          <a href="#/top5">Top 5</a>
          <a href="#/leaderboard">Leaderboard</a>
        </div>
        <p class="footer-copy">© 2026 Top5Battle. All rights reserved.</p>
      </div>
    </footer>

    <!-- Login Modal -->
    <div class="modal-overlay hidden" id="login-modal">
      <div class="modal">
        <button class="modal-close" id="login-modal-close">✕</button>
        <h2 class="modal-title">Join the Battle</h2>
        <p class="modal-subtitle">Sign in to vote and comment</p>
        <div class="social-buttons">
          <button id="google-login" class="btn btn-social btn-google">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Sign in with Google
          </button>
          <button id="github-login" class="btn btn-social btn-github">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
            Sign in with GitHub
          </button>
        </div>
        <div class="divider"><span>or</span></div>
        <form id="email-login-form" class="email-form">
          <input type="email" id="email-input" placeholder="Email address" required>
          <input type="password" id="password-input" placeholder="Password" required>
          <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>
        <p class="modal-footer-text">No account? We'll create one automatically on social login.</p>
      </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="app.js"></script>

</html>
